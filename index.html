// ── PART 0: FOUNDATIONS ──────────────────────────────────────────────
{part:0,partTitle:"Foundations",partSub:"Build the mindset and skills that make everything else land",
title:"Prompt Engineering for PMs",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P0</span> Foundations · Lesson 1</div>
  <div class="lesson-title">Prompt Engineering for PMs</div>
  <div class="lesson-intro">Before you memorise templates, understand the principles behind them. This lesson teaches you how to write prompts that reliably get great outputs — and how to debug the ones that don't. Every lesson in this course builds on these fundamentals.</div>
</div>
<h2>Why Prompting Is a Skill</h2>
<p>Most people treat Claude like a search engine — type a question, get an answer. Prompt engineering is different: it's <strong>designing an interaction</strong>. You're specifying a role, a task, a format, constraints, and context. The better you design the interaction, the better the output.</p>
<h2>The Four Elements of a Great Prompt</h2>
<h3>1. Role</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Role examples</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>❌ "Review my PRD"
✅ "You are a senior engineer who's been burned by vague specs.
    Review this PRD and flag every requirement that's ambiguous
    or untestable."</pre></div>
<h3>2. Task</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Task precision</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>❌ "Help me with my metrics"
✅ "Given our current DAU of 4,200 and a target of 6,000,
    identify the 3 user behaviours most correlated with
    higher engagement. Rank by impact, not effort."</pre></div>
<h3>3. Format</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Format specification</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Format the output as:
- Max 300 words
- Bullet points for findings, prose for the recommendation
- Assume the reader is a non-technical VP — no jargon
- End with one clear, bold "The Ask"</pre></div>
<h3>4. Constraints</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Constraints</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Constraints:
- Do not recommend hiring more people
- Do not suggest solutions that require engineering changes
- Do not hedge — give me a recommendation, not a list of options</pre></div>
<h2>Advanced Techniques</h2>
<h3>Chain-of-thought: make Claude show its work</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Chain-of-thought</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Before giving your answer, reason through it step by step.
Show your working in a "Reasoning" section, then give your
final answer in a "Conclusion" section.</pre></div>
<h3>Few-shot: show Claude what good looks like</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Few-shot example</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>I want user stories in this format. Here are two examples:

GOOD: "As a freelancer sending my first invoice, I want to
see a preview before sending so I can catch errors without
embarrassing myself with a client."

BAD: "As a user, I want to preview the invoice."

Now write 5 user stories for [feature] using the GOOD format.</pre></div>
<h3>The debug loop</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Debug prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>That output wasn't quite right. Here's what I was hoping for:
[describe the ideal output]

Here's what was wrong with the previous output:
[specific critique]

Please try again with those adjustments.</pre></div>
<div class="callout tip"><p>The single highest-leverage habit: always specify your audience. "Write this for a non-technical VP" produces dramatically better output than "write this clearly."</p></div>
<div class="callout exercise"><p>Take any prompt you've written before and run it through the four-element framework: Role, Task, Format, Constraints. Add whatever's missing. Compare the outputs. Save the improved version as a template in your GitHub repo (you'll set this up in Part 7).</p></div>
`},

{part:0,partTitle:"Foundations",partSub:"Build the mindset and skills that make everything else land",
title:"AI Ethics & Responsible Use for PMs",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P0</span> Foundations · Lesson 2</div>
  <div class="lesson-title">AI Ethics & Responsible Use for PMs</div>
  <div class="lesson-intro">Knowing when NOT to use AI is as important as knowing how. This lesson covers data safety, output verification, team transparency, and the ethical responsibilities that come with being an AI-enabled PM.</div>
</div>
<h2>What You Should Never Paste Into Claude</h2>
<ul>
  <li><strong>Never paste PII</strong> — customer names, emails, phone numbers, payment data</li>
  <li><strong>Never paste under NDA</strong> — confidential contracts, M&A information, unreleased financials</li>
  <li><strong>Never paste access credentials</strong> — API keys, passwords, tokens. Note: your GitHub repo will contain MCP config files — make sure API keys are in environment variables, never hardcoded in files you commit.</li>
  <li><strong>Never paste patient or health data</strong> — even anonymised data may be re-identifiable</li>
  <li><strong>Check your company policy</strong> — many organisations have explicit data classification rules</li>
</ul>
<div class="callout warning"><p>When working with real customer data, anonymise it first. Replace names with "User A", emails with "user@example.com". Claude's output quality won't suffer — and your repo won't accidentally contain PII if you commit your session notes.</p></div>
<h2>Verifying Claude's Outputs</h2>
<table>
  <tr><th>Output type</th><th>Verification step</th></tr>
  <tr><td>Market data / statistics</td><td>Check the original source — Claude can hallucinate numbers</td></tr>
  <tr><td>Competitor claims</td><td>Verify on competitor's website before sharing</td></tr>
  <tr><td>Legal / compliance content</td><td>Always route through a lawyer</td></tr>
  <tr><td>Code changes</td><td>Have an engineer review the PR before merging</td></tr>
  <tr><td>PRDs and specs</td><td>Validate with engineering and design</td></tr>
  <tr><td>Research synthesis</td><td>Spot-check against source transcripts</td></tr>
</table>
<h2>Transparency with Your Team</h2>
<ul>
  <li>If a PRD was AI-assisted, the ideas and decisions in it are still yours — disclosure is a judgment call</li>
  <li>If a research synthesis was AI-generated, tell your team — they may spot errors you missed</li>
  <li>Never present AI-generated data analysis as your own analytical work without disclosing it</li>
</ul>
<div class="callout tip"><p>A simple norm that works well: "Claude-assisted" as a tag on documents or in your PR description — like you'd tag "Draft" or "WIP". It sets expectations without making a big deal of the tooling.</p></div>
<h2>When NOT to Use Claude</h2>
<ul>
  <li><strong>Sensitive personnel conversations</strong> — performance issues, redundancies, HR matters</li>
  <li><strong>Novel strategic decisions</strong> — Claude is trained on the past; your novel context is yours alone</li>
  <li><strong>Building relationships</strong> — AI-written emails to key stakeholders can feel hollow. Write those yourself.</li>
  <li><strong>Final judgment calls</strong> — Claude can inform decisions; it shouldn't make them for you</li>
</ul>
<h2>The PM's AI Responsibility Checklist</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Before sharing any AI-assisted output</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>□ Have I removed any PII or confidential data from the input?
□ Have I fact-checked any statistics or external claims?
□ Have I read the full output — not just skimmed it?
□ Does the output represent my actual views and judgment?
□ Would I be comfortable if my team knew how this was produced?
□ Is there anything here that needs expert review (legal, financial)?
□ If I'm committing this to GitHub, does it contain any secrets or PII?</pre></div>
<div class="callout exercise"><p>Review your company's data handling policy. Write a one-paragraph "AI use guidelines" doc for your team. Commit it to your GitHub repo as <code>docs/ai-guidelines.md</code> — you'll have this set up by Part 7.</p></div>
`},

// ── PART 1: ADVANCED CLAUDE CODE ────────────────────────────────────
{part:1,partTitle:"Advanced Claude Code",partSub:"Master the tools that make everything else possible",
title:"Give Claude Persistent Memory",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P1</span> Advanced Claude Code · Lesson 3</div>
  <div class="lesson-title">Give Claude Persistent Memory of Your Projects</div>
  <div class="lesson-intro">By default, Claude Code forgets everything when you close a session. Wire up CLAUDE.md files so Claude always knows your product, your team, and your context. Because these files live in your GitHub repo, they're version-controlled, shareable with your team, and always up to date.</div>
</div>
<h2>How Claude Memory Works</h2>
<p>Claude Code reads <code>CLAUDE.md</code> files automatically from three locations:</p>
<ul>
  <li><strong>~/CLAUDE.md</strong> — Your global profile. Applies to every project on your machine.</li>
  <li><strong>/your-repo/CLAUDE.md</strong> — Project-level context. Committed to the repo so teammates get the same context.</li>
  <li><strong>/your-repo/src/CLAUDE.md</strong> — Sub-folder context for monorepos.</li>
</ul>
<div class="callout tip"><p>Your project <code>CLAUDE.md</code> belongs in the root of your GitHub repo. Commit and push it like any other file — when a teammate clones the repo and opens Claude Code, they get the full context automatically.</p></div>
<h2>Your Global Profile</h2>
<div class="code-block"><div class="code-header"><span class="code-label">~/CLAUDE.md — Global Profile</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># About Me
I'm a Product Manager at [Company].

## My Role
- Product area: [e.g. "Growth & Monetisation"]
- Team size: [e.g. "4 engineers, 1 designer"]
- Stage: [e.g. "Series B, ~200 customers"]

## How I Work
- I prefer direct, concise answers
- Always show me the "why" behind recommendations
- When giving options, limit to 3 and recommend one
- I write docs in Markdown, stored on GitHub

## My Stack
- PM tools: Notion, Linear, Figma, Amplitude
- Version control: GitHub (repos at github.com/[your-org])
- Data: SQL (basic), Amplitude, Mixpanel

## Preferred Output Formats
- PRDs: PRFAQ format, saved as .md files
- Analysis: Lead with the insight, then support with data
- Emails: Short, action-oriented, no corporate speak
- Code/prototypes: Single HTML files, pushed to GitHub Pages</pre></div>
<h2>Your Project CLAUDE.md</h2>
<div class="code-block"><div class="code-header"><span class="code-label">/your-repo/CLAUDE.md — committed to GitHub</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Project: [Product Name]
# Repo: github.com/[org]/[repo]

## What This Is
[One sentence description]

## Our Users
- Primary persona: [Name, role, pain point]
- Secondary persona: [Name, role, pain point]

## Current Sprint / Quarter Goal
- OKR: [e.g. "Reduce time-to-first-invoice to under 5 min"]
- Sprint: [current sprint goal]

## Key Metrics
- North Star: [metric name]
- Current: [value] → Target: [value]

## Known Constraints
- [e.g. "No changes to billing module until Q3"]

## GitHub Structure
- PRDs live in: /docs/prds/
- Research lives in: /docs/research/
- Prototypes live in: /prototypes/ (deployed via GitHub Pages)
- Decisions log: /docs/decisions-log.md

## Glossary
- WAI: Weekly Active Invoices
- ICP: Ideal Customer Profile</pre></div>
<h2>Keeping Memory Fresh</h2>
<p>After any important session, ask Claude: <em>"Based on our conversation, what should I add to CLAUDE.md?"</em> Then commit the update:</p>
<div class="code-block"><div class="code-header"><span class="code-label">Committing a CLAUDE.md update</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>git add CLAUDE.md
git commit -m "docs: update CLAUDE.md with Q3 OKR and new constraints"
git push</pre></div>
<div class="callout exercise"><p>Create your <code>~/CLAUDE.md</code> and a project <code>CLAUDE.md</code> in your main product repo. Commit and push the project one. Start a new session and ask: "What are my current priorities?" It should answer correctly without prompting.</p></div>
`},

{part:1,partTitle:"Advanced Claude Code",partSub:"Master the tools that make everything else possible",
title:"Manage Context So Claude Never Loses the Thread",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P1</span> Advanced Claude Code · Lesson 4</div>
  <div class="lesson-title">Manage Context So Claude Never Loses the Thread</div>
  <div class="lesson-intro">Claude Code has a finite context window. In long sessions it starts "forgetting" earlier details. Manage context deliberately — and save outputs to your GitHub repo as you go, so work survives any context reset.</div>
</div>
<h2>The Four Context Commands</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Context commands</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>/clear          # Wipe the conversation — use when switching tasks
/compact        # Summarise & compress mid-session
claude --resume # Pick up a past session
claude --continue # Continue most recent session</pre></div>
<h2>The GitHub-Backed Session Strategy</h2>
<p>The key insight: if Claude writes outputs to files in your repo as you go, a context reset is never catastrophic. You always have the work.</p>
<ol class="steps">
  <li><strong>Prime at the start.</strong> "Read CLAUDE.md, then I'll give you today's task."</li>
  <li><strong>Break big tasks into phases.</strong> Research → Synthesis → Drafting → Review.</li>
  <li><strong>Save outputs to the repo mid-session.</strong> "Write your analysis to docs/research/interview-synthesis-[date].md" — this creates a file you can commit.</li>
  <li><strong>Checkpoint before switching.</strong> "Summarise key decisions in 5 bullets." Then /compact.</li>
  <li><strong>Commit at natural breakpoints.</strong> After each phase, commit the outputs so they're safe.</li>
</ol>
<div class="code-block"><div class="code-header"><span class="code-label">Phase-based session with GitHub saves</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Phase 1 — Load
"Read CLAUDE.md and the interview transcripts in docs/research/raw/.
Don't analyse yet. Confirm you've read them and list participant names."

# Phase 2 — Analyse
"Extract the top 5 recurring themes. Write your findings to
docs/research/interview-synthesis-2025-03-01.md"

# Phase 3 — Commit the work
git add docs/research/
git commit -m "research: add interview synthesis March 2025"
git push

# Phase 4 — Continue with fresh context
claude --continue
"The synthesis is now saved. Let's move to recommendations."</pre></div>
<div class="callout tip"><p>Biggest context mistake: dumping a 10,000-word document AND asking a complex question in the same message. Send the doc first, confirm Claude has read it, then ask.</p></div>
<div class="callout exercise"><p>Start a session, load a long document, do some analysis, ask Claude to write the output to a file, then commit that file. Practice treating GitHub commits as your session checkpoints.</p></div>
`},

{part:1,partTitle:"Advanced Claude Code",partSub:"Master the tools that make everything else possible",
title:"Orchestrate Sub-Agents to Work in Parallel",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P1</span> Advanced Claude Code · Lesson 5</div>
  <div class="lesson-title">Orchestrate Sub-Agents to Work in Parallel</div>
  <div class="lesson-intro">Claude Code can spawn multiple sub-agents working simultaneously. For PMs, this is like deploying a team of analysts in minutes — running competitive research, analysing data, and drafting docs all at once. Each agent writes to a file in your repo, so results are automatically version-controlled.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">Terminal — enable parallel agents</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>claude --dangerously-skip-permissions</pre></div>
<div class="callout warning"><p>Only use this flag in trusted environments. Review outputs before committing them to your repo.</p></div>
<h2>PM Use Case: Competitive Intelligence Sprint</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Orchestration prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Research 4 competitors in parallel: Notion, Coda, Confluence, Linear.

Spawn 4 sub-tasks, one per competitor.
Each task: pricing, key features, target user, recent changes.
Each writes findings to docs/competitive/competitor-[name].md

Once all 4 complete, synthesise into docs/competitive/summary.md:
- Price tiers
- Core differentiator
- Best for
- Biggest weakness

Then I'll commit and push the whole /docs/competitive/ folder.</pre></div>
<h2>The Orchestration Mental Model</h2>
<ul>
  <li><strong>Decompose:</strong> What sub-tasks are truly independent?</li>
  <li><strong>Delegate:</strong> What does each agent need to know / produce?</li>
  <li><strong>Synthesise:</strong> How should results be combined, and what file does the final output go to?</li>
</ul>
<div class="callout exercise"><p>Pick 3 competitors. Write an orchestration prompt that researches all 3 in parallel and produces files in <code>docs/competitive/</code>. Run it, review the output, then commit the whole folder to your repo in one commit.</p></div>
`},

{part:1,partTitle:"Advanced Claude Code",partSub:"Master the tools that make everything else possible",
title:"Build Custom Skills That Automate Repeatable Work",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P1</span> Advanced Claude Code · Lesson 6</div>
  <div class="lesson-title">Build Custom Skills That Automate Repeatable Work</div>
  <div class="lesson-intro">Custom slash commands are reusable "skills" you define once and invoke forever. Because they live in your GitHub repo, they're version-controlled, shareable with your team via a simple clone, and improvable over time through pull requests.</div>
</div>
<h2>Where Commands Live</h2>
<p>Commands can live in two places — your personal machine, or your shared repo:</p>
<div class="code-block"><div class="code-header"><span class="code-label">Command locations</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Personal commands (only you see these)
~/.claude/commands/

# Team commands (everyone who clones the repo gets these)
/your-repo/.claude/commands/</pre></div>
<p>For anything your whole team benefits from — PRDs, briefs, status updates — put it in the repo's <code>.claude/commands/</code> folder and commit it. When teammates clone the repo, they instantly have your full command library.</p>
<div class="code-block"><div class="code-header"><span class="code-label">Set up team command folder</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>mkdir -p .claude/commands
# create your commands here
git add .claude/
git commit -m "feat: add team PM command library"
git push</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">.claude/commands/prd.md</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Write a PRD for: $ARGUMENTS

Save the output to docs/prds/[feature-name]-prd.md

## TL;DR
## Problem Statement
## Success Metrics
| Metric | Baseline | Target | Timeline |
## Proposed Solution
## User Stories (top 5 only)
## Out of Scope
## Open Questions
## Risks & Mitigations

After writing, ask: "What's missing or needs more detail?"
Then remind me to: git add docs/prds/ && git commit -m "docs: add PRD for [feature]"</pre></div>
<div class="callout tip"><p>Every command that produces a document should end with a reminder to commit it. Building this habit means your GitHub repo becomes a living record of all your PM work — not just code.</p></div>
<div class="callout exercise"><p>Create at least 3 custom commands in your repo's <code>.claude/commands/</code> folder. Commit and push them. Share the GitHub repo link with a colleague and ask them to clone it — verify they can run your commands immediately.</p></div>
`},

{part:1,partTitle:"Advanced Claude Code",partSub:"Master the tools that make everything else possible",
title:"Wire Up MCP Integrations to Your Real Tools",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P1</span> Advanced Claude Code · Lesson 7</div>
  <div class="lesson-title">Wire Up MCP Integrations to Your Real Tools</div>
  <div class="lesson-intro">MCP (Model Context Protocol) lets Claude Code talk directly to Notion, Slack, GitHub, Linear, Figma, and more. The GitHub MCP is especially powerful — Claude can read your PRs, issues, and code directly, without you copying and pasting anything.</div>
</div>
<h2>Setting Up the GitHub MCP First</h2>
<p>Start with GitHub — it's the most immediately useful for PMs and directly complements everything else in this course.</p>
<div class="code-block"><div class="code-header"><span class="code-label">~/.claude/claude_desktop_config.json</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>{
  "mcpServers": {
    "github": {
      "command": "npx",
      "args": ["-y", "@modelcontextprotocol/server-github"],
      "env": {
        "GITHUB_PERSONAL_ACCESS_TOKEN": "YOUR_TOKEN_HERE"
      }
    }
  }
}</pre></div>
<div class="callout warning"><p>Never commit your <code>claude_desktop_config.json</code> to GitHub — it contains your API token. Add it to your <code>.gitignore</code> immediately: <code>echo "claude_desktop_config.json" >> ~/.gitignore_global</code></p></div>
<h2>What the GitHub MCP Unlocks</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Powerful GitHub MCP prompts</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Weekly engineering digest
"Look at github.com/[org]/[repo]. For the past 7 days:
summarise PRs merged by feature area, issues closed,
bugs fixed, and any PRs open >3 days.
Write this as a non-technical 'What shipped this week'
update and save to docs/updates/week-[date].md"

# Sprint review prep
"Read all issues closed in the last 2 weeks in [repo].
Group them by label/milestone. Write a sprint review
summary to docs/sprints/sprint-[N]-review.md"

# PR review from PM perspective
"Review PR #[N] in [repo]. Does it match the spec
in docs/prds/[feature]-prd.md? Flag any discrepancies."

# Release notes
"Read all PRs merged since tag v[X.X] in [repo].
Write user-facing release notes (no technical jargon)
and save to docs/releases/v[X.X]-release-notes.md"</pre></div>
<h2>Adding More MCP Servers</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Other useful PM MCP servers</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>npx @notionhq/notion-mcp-server        # Read/write Notion pages
npx @modelcontextprotocol/server-slack # Search Slack messages
npx linear-mcp-server                  # Manage Linear issues
npx figma-mcp                          # Read Figma designs</pre></div>
<div class="callout tip"><p>With the GitHub MCP, you can reference your actual repo in every prompt: "Read the CLAUDE.md in github.com/[org]/[repo]" — useful when working from a machine that doesn't have the repo cloned locally.</p></div>
<div class="callout exercise"><p>Set up the GitHub MCP and run the "What shipped this week" prompt for your main product repo. Commit the generated file. Next week, run it again — you've started a version-controlled record of every week's progress.</p></div>
`},

{part:2,partTitle:"Research & Discovery",partSub:"Turn interviews, surveys, and competitive intel into real artifacts",
title:"Design a Research Plan Claude Can Execute",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P2</span> Research & Discovery · Lesson 8</div>
  <div class="lesson-title">Design a Research Plan Claude Can Execute</div>
  <div class="lesson-intro">Write structured research plans that Claude can actively help you execute — from question design through to participant recruitment messages. All outputs are saved to your GitHub repo so research is findable, shareable, and never lost.</div>
</div>
<div class="prompt-template">
  <div class="prompt-template-label">📋 RESEARCH PLAN TEMPLATE</div>
  <pre>Help me design a research plan:

RESEARCH QUESTION: [What decision are we trying to make?]
METHODOLOGY: [Interviews / Survey / Usability test]
TIMELINE: [Days/weeks available]
SAMPLE SIZE: [How many participants?]
PARTICIPANT CRITERIA: [Who are we talking to?]

Produce and save to docs/research/[topic]-research-plan.md:
1. A refined research question
2. A 45-minute discussion guide (6-8 open questions)
3. A screener survey (5 questions max)
4. A recruitment email
5. A note-taking template</pre>
</div>
<h2>Organising Research in GitHub</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Recommended research folder structure</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>docs/research/
├── [topic]-research-plan.md    # The plan (this lesson)
├── raw/
│   ├── interview-01.md         # Raw transcripts (anonymised)
│   ├── interview-02.md
│   └── survey-responses.csv
├── [topic]-synthesis.md        # Analysis output (Lesson 9)
└── [topic]-brief.md            # Decision brief (Lesson 12)</pre></div>
<div class="callout tip"><p>Raw transcripts should be anonymised before committing. Replace real names with "P1", "P2" etc. Store the name mapping locally or in a private Notion page — never in the public repo.</p></div>
<div class="callout exercise"><p>Use the template for a real product question you're sitting on. Ask Claude to save the plan to <code>docs/research/</code>. Commit it. The research plan is now your source of truth and you can link to it from Linear tickets.</p></div>
`},

{part:2,partTitle:"Research & Discovery",partSub:"Turn interviews, surveys, and competitive intel into real artifacts",
title:"Extract Insights from User Interviews",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P2</span> Research & Discovery · Lesson 9</div>
  <div class="lesson-title">Extract Insights from User Interviews Automatically</div>
  <div class="lesson-intro">Turn hours of transcripts into actionable insights. Claude compresses a week of manual analysis into 30 minutes. Outputs are committed to your repo so the whole team can read, comment on, and build on the research.</div>
</div>
<h2>Single Interview Analysis</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Single transcript prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Read docs/research/raw/interview-[N].md

Extract and save to docs/research/interview-[N]-analysis.md:
1. TOP PAIN POINTS (ranked by emotional intensity)
2. JOBS TO BE DONE
3. CURRENT WORKAROUNDS
4. FEATURE REQUESTS (explicit and implicit)
5. MEMORABLE QUOTES (3 that would resonate with eng/design)
6. SURPRISES — anything that contradicts our assumptions

Rate confidence: High / Medium / Low for each finding</pre></div>
<h2>Cross-Interview Synthesis</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Multi-transcript synthesis</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">Read all files in docs/research/raw/ that match interview-*.md
There are [N] transcripts. Don't analyse yet — confirm you've
read them and list the participant codes.

Now synthesise and save to docs/research/[topic]-synthesis.md:
1. THEME MAP — recurring themes with participant references
2. SPECTRUM ANALYSIS — where did participants fall on
   "[state hypothesis]": confirms → challenges?
3. PERSONA SIGNALS — up to 3 emerging personas
4. TOP 3 INSIGHTS — what should change our product direction?
5. OPEN QUESTIONS — what should we explore next?</pre></div>
<div class="callout tip"><p>After committing the synthesis, open a GitHub Issue titled "Research: [topic] — key findings" and paste the Top 3 Insights. Tag your designer and engineering lead. Now the insights are part of your project's discussion history.</p></div>
<div class="callout exercise"><p>Run the multi-transcript synthesis on your next set of interviews. Commit the synthesis file, then open a GitHub Issue with the key findings. Ask teammates to comment — research becomes a conversation, not a document that sits in a folder.</p></div>
`},

{part:2,partTitle:"Research & Discovery",partSub:"Turn interviews, surveys, and competitive intel into real artifacts",
title:"Turn Raw Feedback into Actionable Findings",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P2</span> Research & Discovery · Lesson 10</div>
  <div class="lesson-title">Turn Raw Feedback into Actionable Findings</div>
  <div class="lesson-intro">NPS responses, support tickets, App Store reviews — systematically process any raw feedback source into decision-grade insights, committed to your repo as a dated record.</div>
</div>
<h2>Processing NPS Responses</h2>
<div class="code-block"><div class="code-header"><span class="code-label">NPS analysis prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>[PASTE NPS DATA — anonymised]

Analyse and save to docs/feedback/nps-[month]-[year].md:
1. NPS score calculation
2. Theme analysis by segment: Detractors / Passives / Promoters
3. Top 3 changes that would move most Detractors to Passives
4. 2-3 quotes per segment suitable for a board presentation
5. Any competitors mentioned by name

Then git add docs/feedback/ && git commit -m "research: NPS analysis [month]"</pre></div>
<h2>Processing Support Tickets</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Support ticket prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>[PASTE TICKET DATA — anonymised]

Save to docs/feedback/support-tickets-[month]-[year].md:
1. CATEGORY BREAKDOWN: Bug / Feature Request / UX Confusion /
   Billing / Account / Other — count and %
2. TOP PAIN POINTS within Bug and UX categories
3. SEVERITY TRIAGE: flag data loss, security, core blockers
4. QUICK WINS: frequent but likely simple issues
5. PRODUCT INSIGHT: what does ticket volume tell us about expectations?</pre></div>
<div class="callout tip"><p>Having monthly feedback files committed to GitHub means you can use <code>git diff</code> or GitHub's compare view to see how the themes changed month-over-month. That trend data is often more valuable than any single month's analysis.</p></div>
<div class="callout exercise"><p>Export your last 50 NPS responses or support tickets. Run the prompt, commit the output. Then look at last month's file (if you have one) and ask Claude: "Compare these two feedback files — what's improved, what's got worse, and what's new?"</p></div>
`},

{part:2,partTitle:"Research & Discovery",partSub:"Turn interviews, surveys, and competitive intel into real artifacts",
title:"Run Competitive Analysis on Autopilot",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P2</span> Research & Discovery · Lesson 11</div>
  <div class="lesson-title">Run Competitive Analysis on Autopilot</div>
  <div class="lesson-intro">Build a systematic competitor research system stored in your repo. When the analysis is version-controlled, you can diff it quarterly to see exactly what changed in the competitive landscape.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">Competitor profile prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Research [Competitor] and save to docs/competitive/[name]-[year]-Q[N].md:

## Positioning — tagline, ICP, core value prop, notable omissions
## Product — core features, recent additions, integrations
## Pricing — model, tiers, what's enterprise-only
## Go-to-Market — channels, partnerships, recent campaigns
## Weaknesses — from G2/Capterra/Reddit reviews
## Recent Moves — last 3-6 months
## Our Opportunity — where are they weakest vs. our strengths?</pre></div>
<h2>Quarterly Competitive Diff</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Competitive diff prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">Read docs/competitive/[name]-[year]-Q[N-1].md (last quarter)
and docs/competitive/[name]-[year]-Q[N].md (this quarter).

Summarise what changed:
1. Pricing changes
2. New features launched
3. Messaging/positioning shifts
4. New partnerships or integrations
5. Anything that directly threatens our differentiation

This is the competitive delta — the most important part of any QBR.</pre></div>
<div class="callout tip"><p>Name files consistently: <code>competitor-notion-2025-Q1.md</code>. This makes GitHub's compare feature work perfectly — you can literally see what changed line by line between quarters.</p></div>
<div class="callout exercise"><p>Profile your top 2 competitors, commit the files with a dated name. Set a calendar reminder to re-run this prompt next quarter with the same file naming convention. After two quarters, run the diff prompt and share it in your next planning meeting.</p></div>
`},

title:"Synthesise Everything into Decision-Ready Briefs",
content:`

  <div class="lesson-title">Synthesise Everything into Decision-Ready Briefs</div>

</div>

- docs/research/[topic]-synthesis.md
- docs/feedback/nps-[month].md

DECISION NEEDED: [state the decision]

Synthesise into a decision-ready brief and save to

{part:2,partTitle:"Research & Discovery",partSub:"Turn interviews, surveys, and competitive intel into real artifacts",
title:"Build a Voice of Customer Programme",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P2</span> Research & Discovery · Lesson 13</div>
  <div class="lesson-title">Build a Voice of Customer Programme</div>
  <div class="lesson-intro">A VoC programme is a living system — continuously aggregating signals from every source and surfacing the most important themes. With GitHub as your backbone, every week's digest is version-controlled and the historical record builds automatically.</div>
</div>
<h2>VoC Folder Structure in GitHub</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Recommended VoC structure</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>docs/voc/
├── weekly/
│   ├── voc-2025-W10.md
│   ├── voc-2025-W11.md
│   └── voc-2025-W12.md
├── monthly/
│   ├── voc-2025-02.md
│   └── voc-2025-03.md
└── themes.md  ← running list of tracked themes, updated monthly</pre></div>
<h2>The Weekly VoC Command</h2>
<div class="code-block"><div class="code-header"><span class="code-label">.claude/commands/voc-weekly.md</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Run this week's Voice of Customer synthesis from raw inputs: $ARGUMENTS

Read docs/voc/themes.md for our currently tracked themes.
Read the most recent file in docs/voc/weekly/ for comparison.

ANALYSE AND SAVE TO docs/voc/weekly/voc-[YYYY-WNN].md:

1. SIGNAL VOLUME — data points per source; flag >50% change vs. last week
2. THEME TRACKER — for each tracked theme, what did we hear this week?
3. NEW SIGNALS — emerging themes not in our tracked list
4. SENTIMENT SHIFT — vs. last week's file: improved / worsened / steady
5. TOP QUOTE OF THE WEEK — one quote that best captures customer feeling
6. ROUTING:
   → Engineering: [bugs, performance issues]
   → Design: [UX confusion]
   → Sales: [pricing objections, competitor mentions]
   → PM decision needed: [conflicting signals, strategic questions]

Then produce a Slack-ready digest under 200 words to paste into #product.

Remind me to: git add docs/voc/ && git commit -m "voc: weekly digest [date]"</pre></div>
<h2>The Monthly VoC Review</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Monthly synthesis prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Read all files in docs/voc/weekly/ from the past 4 weeks.

Save to docs/voc/monthly/voc-[YYYY-MM].md:
1. TREND ANALYSIS — themes that grew, shrank, or resolved
2. COHORT DIFFERENCES — did free vs. paid users say different things?
3. PRODUCT IMPACT — which shipped features generated notable feedback?
4. TOP 3 INSIGHTS that should influence next quarter's roadmap
5. BIGGEST OPEN QUESTION — most important thing we still don't understand

Update docs/voc/themes.md to reflect any new or retired themes.</pre></div>
<div class="callout tip"><p>The monthly VoC file in your repo becomes a first-class input to roadmap planning. Link to it from your quarterly planning PR — e.g., "Based on docs/voc/monthly/voc-2025-03.md, here's what customers are asking for."</p></div>
<div class="callout exercise"><p>Set up the VoC folder structure in your repo. Run the weekly command this Friday. Commit the digest. Set a recurring reminder to do this every Friday — your repo will automatically build a historical record of customer sentiment.</p></div>
`},

{part:3,partTitle:"The PM Builder",partSub:"Explore, modify, and ship real product changes",
title:"Make Targeted Improvements to Real Products",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P3</span> The PM Builder · Lesson 15</div>
  <div class="lesson-title">Make Targeted Improvements to Real Products</div>
  <div class="lesson-intro">PMs can make small, meaningful changes directly — copy fixes, microcopy, config changes — safely, via the GitHub PR workflow. The branch-and-review process means nothing ships without oversight.</div>
</div>
<h2>Safe PM-Friendly Changes</h2>
<ul>
  <li><strong>Copy and microcopy</strong> — button labels, error messages, tooltips</li>
  <li><strong>Config changes</strong> — feature flags, default values, limits</li>
  <li><strong>Email templates</strong> — transactional email content</li>
  <li><strong>Validation messages</strong> — form error text</li>
</ul>
<div class="code-block"><div class="code-header"><span class="code-label">Full safe change workflow</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Step 1: Always branch from main
git checkout main && git pull origin main
git checkout -b pm/improve-error-messages

# Step 2: Find the copy
"Search this codebase for 'An unexpected error occurred'.
Show all file paths and surrounding context."

# Step 3: Make the targeted change
"Update the message in [file] on line [N].
Current: 'An unexpected error occurred. Please try again.'
New: 'We couldn't process your invoice. Check your
connection and try again — or contact support.'
Show me a diff before applying."

# Step 4: Review and commit
git diff
git add [file]
git commit -m "improve: make error messages actionable for users

Fixes user confusion reported in 12 support tickets this month.
See: docs/feedback/support-tickets-2025-03.md"

# Step 5: Push and open a PR on GitHub
git push origin pm/improve-error-messages
# Then open github.com/[org]/[repo]/compare to create the PR</pre></div>
<h2>Writing a Good PR Description</h2>
<div class="code-block"><div class="code-header"><span class="code-label">PR description prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">Write a GitHub PR description for this change.
Include:
- What changed (specific, one sentence)
- Why (link to supporting evidence in docs/)
- How to test (step-by-step, no assumptions)
- Screenshots or before/after if it's a UI change

Add a line: "This is a PM-authored change — please flag
any technical concerns before merging."</pre></div>
<div class="callout warning"><p>Never push directly to <code>main</code>. Always use a branch and open a PR — even for tiny changes. The PR is a paper trail, a safety check, and a communication tool all in one.</p></div>
<div class="callout exercise"><p>Find one confusing error message in your product. Locate it in the codebase with Claude, create a branch, make the change, write the PR description, and open a draft PR on GitHub. Even if you don't merge it, you've created a clear handoff for engineering.</p></div>
`},

title:"Spin Up Prototypes and Feature Variants Fast",
content:`
<div class="lesson-header">

  <div class="lesson-title">Spin Up Prototypes and Feature Variants Fast</div>
  <div class="lesson-intro">Claude Code generates working HTML prototypes in minutes. Hosted on GitHub Pages, your prototypes get a real URL you can share with anyone — no downloads, no Figma access required, just a link.</div>
</div>
<h2>Setting Up GitHub Pages for Prototypes</h2>
<ol class="steps">
  <li>In your repo, go to <strong>Settings → Pages</strong></li>
  <li>Set Source to: <strong>Deploy from a branch → main → /prototypes</strong></li>
  <li>Save. Your prototypes will be live at <code>https://[org].github.io/[repo]/[filename].html</code></li>
  <li>Create the folder: <code>mkdir -p prototypes</code> and commit a placeholder <code>index.html</code></li>
</ol>
<div class="code-block"><div class="code-header"><span class="code-label">Prototype generation prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Build a working HTML prototype of a "Payment Reminders" settings page:
- Toggle to enable/disable automatic reminders
- Options: 3 days before / on due date / 3 days after
- Custom message text field
- Email preview
- Save button

Style: clean SaaS settings page, white bg, blue (#2563EB) primary.
Save as a single self-contained HTML file to:
prototypes/payment-reminders-v1.html

After saving, remind me to:
git add prototypes/
git commit -m "prototype: payment reminders settings page v1"
git push

The file will then be live at:
https://[org].github.io/[repo]/payment-reminders-v1.html</pre></div>
<h2>A/B Variant Prototypes</h2>
<div class="code-block"><div class="code-header"><span class="code-label">A/B variant prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>

prototypes/pricing-v1-control.html
prototypes/pricing-v2-annual-first.html
prototypes/pricing-v3-feature-table.html

Add a banner to each: "VARIANT [A/B/C] — for testing only"
Identical visual design, different structure only.

After pushing, each variant will be live at its own URL —
share all 3 with stakeholders for feedback.</pre></div>
<div class="callout tip"><p>Share prototype links in GitHub Issues or PR comments. Stakeholders can leave feedback right where the decision is being made, and you have a timeline of how the design evolved.</p></div>
<div class="callout exercise"><p>Enable GitHub Pages on your repo. Build an HTML prototype for a feature you're planning. Push it, get the live URL, and share it in a GitHub Issue tagged with your design and engineering leads. Ask for feedback in the issue comments.</p></div>
`},

{part:3,partTitle:"The PM Builder",partSub:"Explore, modify, and ship real product changes",
title:"Ship Safely with Git and GitHub",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P3</span> The PM Builder · Lesson 17</div>
  <div class="lesson-title">Ship Safely with Git and GitHub</div>
  <div class="lesson-intro">GitHub is the safety net that lets PMs make changes confidently. This lesson covers the full PM workflow on GitHub — branching, committing, reviewing PRs, and using GitHub's collaboration features to make your PM work visible and trustworthy.</div>
</div>
<h2>The PM GitHub Workflow</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Complete PM change workflow</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Always start clean
git checkout main && git pull origin main

# Create a descriptive branch
git checkout -b pm/improve-onboarding-copy

# Make changes with Claude Code, then review
git diff

# Stage thoughtfully — review each chunk
git add -p

# Commit with a useful message
git commit -m "improve: update onboarding empty states to be action-oriented

User research (docs/research/onboarding-synthesis.md) showed
users felt stuck on empty screens. These copy changes provide
clear next-step guidance."

# Push to GitHub
git push origin pm/improve-onboarding-copy

# Open a PR on GitHub
# Use GitHub's web UI: [repo]/compare/pm/improve-onboarding-copy</pre></div>
<h2>GitHub-Specific PM Superpowers</h2>
<h3>Linking PRs to research</h3>
<div class="code-block"><div class="code-header"><span class="code-label">PR body with evidence links</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">## Why this change
Based on analysis in [docs/research/onboarding-synthesis.md](../docs/research/onboarding-synthesis.md)
and support ticket review in [docs/feedback/support-2025-03.md](../docs/feedback/support-2025-03.md).

## Related issues
Closes #123 (Empty state confusion)
Relates to #89 (Onboarding improvements epic)</pre></div>
<h3>Using GitHub Issues for PM decisions</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Decision issue template</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre"># Decision: [title]

## Context
[Why this decision is needed]

## Options considered
- Option A: [description, pros, cons]
- Option B: [description, pros, cons]

## Decision
[What we decided and why]

## Evidence
[Link to relevant research, data, or brief in docs/]

/cc @engineering-lead @designer</pre></div>
<h3>PM-friendly git commands with Claude</h3>
<div class="code-block"><div class="code-header"><span class="code-label">Git help prompts</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Review a PR as a PM
"Read PR #[N] in this repo. Does it match the PRD at
docs/prds/[feature]-prd.md? List any discrepancies."

# Write a commit message
"Write a conventional commit message for these changes: [describe diff]"

# Undo a mistake on a branch
"I made changes to [file] on branch [name] that I want to undo.
How do I restore it to match main?"

# See what changed recently
"Show me what files changed in the last 5 commits and summarise
the changes in plain English."</pre></div>
<div class="callout exercise"><p>Open a GitHub Issue in your repo titled "PM Git Practice." Create a branch, make a small change, write a descriptive PR that links to a research doc, and request a review from your engineering lead. The goal: make your PM changes as visible and trustworthy as engineering changes.</p></div>
`},

{part:3,partTitle:"The PM Builder",partSub:"Explore, modify, and ship real product changes",
title:"Working with Design Using Claude",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P3</span> The PM Builder · Lesson 18</div>
  <div class="lesson-title">Working with Design Using Claude</div>
  <div class="lesson-intro">Claude helps you write better design briefs, run heuristic evaluations, and generate UX copy at scale. Store everything in your repo so designers have a single source of truth — and can leave feedback via GitHub comments.</div>
</div>
<h2>Writing Design Briefs That Designers Love</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Design brief prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Write a design brief for: [feature or problem]

Context:
- User problem: [describe]
- Business goal: [describe]
- Existing design: [Figma link or describe]
- Constraints: [technical, time, brand]

Save to docs/design/[feature]-design-brief.md:

## Problem Statement (one paragraph — the "before" state)
## Design Goals (3-5 goals, each starting with a verb)
## User & Context (who, in what situation, on what device)
## Success Criteria (how will we know the design works?)
## Constraints & Non-Negotiables
## Open Questions for Design (deliberately left to the designer)

Keep it to one page. Don't specify the solution.</pre></div>
<h2>Heuristic Evaluation</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Heuristic evaluation prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Evaluate this design against Nielsen's 10 usability heuristics.

Design: [describe the screen or paste Figma export]
User: [who uses this and what they're trying to do]

For each heuristic, rate: Pass / Concern / Fail
Only flag Concerns and Fails with specific observations.

Save to docs/design/[feature]-heuristic-eval.md
End with: Top 3 issues to fix before dev handoff.

Then open a GitHub Issue: "Design review: [feature] — [N] issues found"
and link to this file.</pre></div>
<h2>Generating UX Copy at Scale</h2>
<div class="code-block"><div class="code-header"><span class="code-label">UX copy generation prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Generate UX copy using our voice: [describe tone]

Save to docs/design/[feature]-ux-copy.md:

EMPTY STATES: no invoices yet / no clients / no data
ERROR MESSAGES: network error / invalid email / payment declined
SUCCESS MESSAGES: invoice sent / payment received / account connected
BUTTON LABELS: start invoice / archive client / export PDF

For each, give 2 options and mark your recommendation.
Engineers can reference this file directly when building the feature.</pre></div>
<div class="callout tip"><p>Share design brief and evaluation files as GitHub links in your Figma comments or Linear tickets. The feedback loop becomes: brief in GitHub → design in Figma → evaluation back in GitHub → dev handoff from GitHub.</p></div>
<div class="callout exercise"><p>Write a design brief for your next feature. Commit it. Share the GitHub link (not a copy-paste) with your designer and ask them to leave comments directly on the file. Run the heuristic evaluation on their next design and open a GitHub Issue with the findings.</p></div>
`},

{part:3,partTitle:"The PM Builder",partSub:"Explore, modify, and ship real product changes",
title:"Write Technical Specs Engineers Actually Trust",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P3</span> The PM Builder · Lesson 19</div>
  <div class="lesson-title">Write Technical Specs Engineers Actually Trust</div>
  <div class="lesson-intro">The gap between a PRD and a technical spec is where features go wrong. With specs committed to your GitHub repo, engineers can review them via PR, leave inline comments, and approve before a single line of code is written.</div>
</div>
<h2>Data Model Specification</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Data model prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>I'm building: [describe the feature]

Help me define the data model and save to
docs/specs/[feature]-data-model.md:

1. ENTITIES: new tables/objects needed, key fields, relationships
2. STATE MACHINE: all states and valid transitions
3. EDGE CASES: data scenarios that might break a naive implementation
4. QUESTIONS FOR ENGINEERING: decisions the team needs to make

Format in plain English with a simple table for each entity.
I'm not asking for SQL — help me think through what data
we need and how it relates.</pre></div>
<h2>The Spec Review PR Workflow</h2>
<p>The most powerful thing you can do with a technical spec is treat it like code — review it via PR before it's "merged" into the sprint.</p>
<div class="code-block"><div class="code-header"><span class="code-label">Spec PR workflow</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Write the spec to a branch
git checkout -b spec/payment-reminders
# Claude writes to docs/specs/payment-reminders-spec.md
git add docs/specs/
git commit -m "spec: payment reminders — draft for engineering review"
git push origin spec/payment-reminders

# Open a PR on GitHub — title: "Spec review: Payment Reminders"
# Request review from: engineering lead, designer
# Add to PR description:
"Please review and leave comments on any:
- Requirements that are ambiguous or untestable
- Technical concerns or missing considerations
- Assumptions you'd challenge
Approve when you're confident we can start building."

# After approval, merge to main
# This merge = team alignment, captured forever in Git history</pre></div>
<h2>Non-Functional Requirements</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Technical requirements prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">I've written functional requirements in docs/prds/[feature]-prd.md.
Help me write the non-functional requirements section and append
to docs/specs/[feature]-spec.md:

Context:
- Expected volume: [e.g. "500 concurrent users, 10k invoices/day"]
- Stack: [e.g. "REST API, Postgres, React"]
- Compliance: [e.g. "GDPR, SOC 2"]

Write requirements for: performance, reliability, security,
scalability, accessibility, browser/device support.
Format: "The system SHALL [behaviour] WHEN [condition]"</pre></div>
<div class="callout warning"><p>Technical specs involve long-term architectural decisions. Always request your engineering lead's review via GitHub PR before the spec is considered final. The PR comment history is the paper trail that protects everyone.</p></div>
<div class="callout exercise"><p>Take a feature in your current sprint. Write the data model using the prompt above, commit it to a spec branch, and open a PR requesting your engineering lead's review. Read their comments carefully — the gaps they identify are your biggest learning.</p></div>
`},

{part:4,partTitle:"Data & Decisions",partSub:"Analyse data and make better product decisions",
title:"Explore Datasets and Build Visual Reports",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P4</span> Data & Decisions · Lesson 20</div>
  <div class="lesson-title">Explore Datasets and Build Visual Reports</div>
  <div class="lesson-intro">Load real datasets, ask plain-English questions, and generate HTML reports deployed to GitHub Pages — shareable with anyone via a URL, always up to date when you push.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">EDA prompt sequence</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Load data from repo
"I have data/exports/user-events-2025-03.csv in this repo.
Read it: how many rows, columns, date range, data quality issues?"

# First question
"Show me daily active users for the past 30 days
plus a 7-day rolling average."

# Segment
"Break down DAU by subscription_plan.
Which tiers are growing and which are shrinking?"

# Anomalies
"Are there any days where DAU dropped >20% vs. previous day?"</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Visual report prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Create an HTML report using Chart.js and save to
prototypes/reports/product-report-[date].html

Include:
1. Line chart: DAU over 90 days with 7-day MA overlay
2. Bar chart: Top 10 features by usage
3. Funnel: Onboarding funnel with % drop-off
4. Table: Top 10 users by engagement

"Key Insights" section at top: 3 bullet points.
Style: white bg, #2563EB brand colour.

After pushing, the report will be live at:
https://[org].github.io/[repo]/reports/product-report-[date].html

Share this URL in your next stakeholder meeting instead of
attaching a PDF — anyone can view it in a browser.</pre></div>
<div class="callout exercise"><p>Export your last 30 days of user events into <code>data/exports/</code>. Generate a visual report and push it to GitHub Pages. Share the URL (not a screenshot) with your team. Ask: "What questions does this raise for you?"</p></div>

{part:4,partTitle:"Data & Decisions",partSub:"Analyse data and make better product decisions",
title:"Diagnose What's Actually Driving Your Metrics",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P4</span> Data & Decisions · Lesson 21</div>
  <div class="lesson-title">Diagnose What's Actually Driving Your Metrics</div>
  <div class="lesson-intro">From "our retention dropped 8 points" to "here's exactly which segment, behaviour, and moment is causing it." Commit the diagnosis to your repo so the whole team works from the same understanding of the problem.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">Full metric diagnostic prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Our [metric] dropped from [X] to [Y] between [A] and [B].
Data is in data/exports/[filename].csv

Run a diagnostic and save to docs/analysis/[metric]-diagnosis-[date].md:

STEP 1 — SEGMENT: Break down change by plan tier, cohort,
geography, feature usage segment. Which segment shows most change?

STEP 2 — TIMELINE: When exactly did the drop start?
Gradual or sudden?

STEP 3 — CORRELATE: We had these changes in this period:
[list releases, incidents from GitHub — check recent PRs if helpful]

STEP 4 — BEHAVIOUR: What behaviour differences appear in the
7 days before the metric change for affected vs. unaffected users?

STEP 5 — HYPOTHESES: Rank top 3 root cause hypotheses.
For each: confidence (H/M/L) and what data would confirm it.

Then open a GitHub Issue: "Metric investigation: [metric] drop [date]"
and link to this analysis file.</pre></div>
<div class="callout tip"><p>With your analysis committed and linked from a GitHub Issue, your engineering team can comment directly: "That correlates with PR #234 which shipped on [date]" — the issue becomes a collaborative investigation, not a solo PM exercise.</p></div>
<div class="callout exercise"><p>Pick a metric that concerns you. Run the diagnostic, commit the file, and open a GitHub Issue with the link. Ask your engineering lead to comment on whether the timing correlates with any recent changes they're aware of.</p></div>
`},

{part:4,partTitle:"Data & Decisions",partSub:"Analyse data and make better product decisions",
title:"Generate Data-Backed Recommendations",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P4</span> Data & Decisions · Lesson 22</div>
  <div class="lesson-title">Generate Data-Backed Recommendations</div>
  <div class="lesson-intro">Combine qualitative intuition with Claude's quantitative analysis to produce recommendations that are both convincing and correct — then commit them so your reasoning is transparent and revisitable.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">Recommendation generation prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Read docs/analysis/[metric]-diagnosis-[date].md

Generate 3 recommendations and save to
docs/analysis/[metric]-recommendations-[date].md:

## Recommendation: [Name]
Finding: [what the data shows]
Evidence: [specific numbers]
Recommendation: [exactly what to do]
Expected impact: [quantified estimate with reasoning]
Confidence: H/M/L — [why]
Risk if wrong: [consequence of incorrect analysis]
How to test: [what confirms this worked in 30/60/90 days]

Rank by: (expected impact × confidence) / effort

Then open a GitHub Issue: "Decision: [top recommendation]"
and link to this file. Tag the stakeholders who need to weigh in.</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Pre-mortem prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>It's 6 months from now and [initiative] failed badly.
1. 3 most likely reasons for failure?
2. What signals would have shown it coming?
3. Which assumptions in my recommendation are most fragile?
4. For each failure mode, suggest one safeguard to add now.

Append this as a "Pre-mortem" section to the recommendations file.</pre></div>
<div class="callout exercise"><p>Take a recommendation you're about to present. Generate it using the prompt, commit it, and open a GitHub Issue asking stakeholders to weigh in before the meeting. You'll walk in having already handled most objections.</p></div>
`},

{part:4,partTitle:"Data & Decisions",partSub:"Analyse data and make better product decisions",
title:"Design and Analyse A/B Experiments",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P4</span> Data & Decisions · Lesson 23</div>
  <div class="lesson-title">Design and Analyse A/B Experiments</div>
  <div class="lesson-intro">Design statistically valid experiments and interpret results without a data science degree. Track experiments as GitHub Issues — so the hypothesis, design, results, and decision are all in one place, permanently.</div>
</div>
<h2>Tracking Experiments in GitHub</h2>
<p>Use a GitHub Issue for every experiment. Label it <code>experiment</code> and use this structure:</p>
<div class="code-block"><div class="code-header"><span class="code-label">Experiment GitHub Issue template</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre"># Experiment: [name]

## Hypothesis
[state it]

## Design
[link to docs/experiments/[name]-design.md]

## Status: [ ] Designing → [ ] Running → [ ] Analysing → [ ] Decision made

## Results
[link to docs/experiments/[name]-results.md]

## Decision
[ ] Ship variant  [ ] Ship control  [ ] Run follow-up experiment
Rationale: [why]</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Experiment design prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Design an A/B experiment and save to
docs/experiments/[name]-design.md:

HYPOTHESIS: [state it]
Baseline metric: [value]
Expected uplift: [value]
Weekly traffic: [volume]

Include:
1. Control and variant description
2. Primary + secondary metrics
3. Sample size (80% power, 95% significance)
4. Estimated duration
5. Guardrail metrics
6. Traffic split rationale
7. Risks that could invalidate results</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Results interpretation prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Read docs/experiments/[name]-design.md for context.

Experiment results:
Control: [N users, X% conversion]
Variant: [N users, Y% conversion]
P-value: [value]

Analyse and save to docs/experiments/[name]-results.md:
1. Statistically significant at 95%?
2. Relative and absolute lift?
3. 95% confidence interval?
4. Should we ship? With what caveats?
5. Projected annual impact if shipped?

Then update the GitHub Issue with the decision.</pre></div>
<div class="callout warning"><p>Never "peek" at results before your planned sample size. The design doc in your repo is your commitment — if you change it mid-experiment, commit the change with a note explaining why.</p></div>
<div class="callout exercise"><p>Design an experiment for a change you're considering. Create the GitHub Issue, commit the design doc, and request your data team's review before starting. The review comment history will be invaluable context when you analyse results later.</p></div>
`},

// ── PART 5: STRATEGY & PLANNING ──────────────────────────────────────
{part:5,partTitle:"Strategy & Planning",partSub:"Set direction, prioritise ruthlessly, and plan for launch",
title:"Writing Better OKRs with Claude",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P5</span> Strategy & Planning · Lesson 24</div>
  <div class="lesson-title">Writing Better OKRs with Claude</div>
  <div class="lesson-intro">OKRs are deceptively hard to write well. Claude is excellent at stress-testing them — catching problems before the quarter starts. Committed to GitHub, your OKRs become version-controlled: you can literally see how they evolved and what changed quarter-to-quarter.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">OKR drafting prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Help me write OKRs for next quarter.

CONTEXT:
- Company-level goal: [e.g. "Grow ARR from £2M to £3M"]
- My product area: [e.g. "Onboarding & Activation"]
- Key problems: [list 3-5]
- Resources: [team size, rough budget]
- Previous quarter's OKRs for reference: docs/okrs/[previous-quarter].md

Draft 2-3 Objectives with 3-4 Key Results each.

Key Result rules:
- Must be a number or % (not a task or output)
- Must be measurable from existing analytics
- 70% achievement = success (ambitious)
- Within our team's direct control

Save to docs/okrs/[year]-[quarter].md

Then highlight any KR that violates these rules with a suggested fix.</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">OKR stress-test prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">Read docs/okrs/[year]-[quarter].md

Stress-test each Key Result:
1. MEASURABLE? Can this be measured objectively?
2. OUTCOME OR OUTPUT? Result for users/business, or just a task?
3. AMBITIOUS ENOUGH? Would we hit this just by doing the obvious?
4. IN OUR CONTROL? Depends on another team or external factor?
5. LEADING OR LAGGING? Can we course-correct mid-quarter?

Output: table of KR | Issue | Suggested Rewrite
Then save the revised version and open a PR for team review.</pre></div>
<h2>OKRs as a GitHub PR</h2>
<p>One of the most underrated PM practices: open a PR for your quarterly OKRs and ask your team to review them before they're finalised.</p>
<div class="code-block"><div class="code-header"><span class="code-label">OKR review PR workflow</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>git checkout -b okrs/2025-Q2
# Claude writes docs/okrs/2025-Q2.md
git add docs/okrs/
git commit -m "planning: draft Q2 2025 OKRs"
git push origin okrs/2025-Q2

# Open PR: "Q2 2025 OKRs — please review before Friday"
# Request reviews from: engineering lead, designer, manager
# Merge once approved = OKRs are locked for the quarter</pre></div>
<div class="callout exercise"><p>Write your next quarter's OKRs using the drafting prompt. Commit them to a branch and open a PR for your team. Track the review comments — every piece of feedback makes the OKRs sharper. Merge only after your engineering lead approves.</p></div>
`},

{part:5,partTitle:"Strategy & Planning",partSub:"Set direction, prioritise ruthlessly, and plan for launch",
title:"Roadmap Planning & Prioritisation",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P5</span> Strategy & Planning · Lesson 25</div>
  <div class="lesson-title">Roadmap Planning & Prioritisation</div>
  <div class="lesson-intro">Prioritisation is the hardest PM skill. Claude can run frameworks against your actual backlog, surface hidden trade-offs, and help you build a roadmap narrative that gets buy-in. The roadmap lives in your repo — version-controlled and linkable from anywhere.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">RICE scoring prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Score these backlog items using RICE.
Cross-reference docs/voc/monthly/voc-[latest].md for user signal
and docs/competitive/summary.md for competitive context.

ITEMS: [list features with one-line descriptions]

For each item estimate:
- REACH: users affected per quarter
- IMPACT: 3=massive / 2=high / 1=medium / 0.5=low / 0.25=minimal
- CONFIDENCE: 100%=high / 80%=medium / 50%=low
- EFFORT: engineering weeks

RICE = (Reach × Impact × Confidence) / Effort

Save ranked table to docs/roadmap/rice-[date].md
Flag items with low confidence and suggest validation approach.</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Roadmap narrative prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">Read docs/roadmap/rice-[date].md and docs/okrs/[current-quarter].md

Build a 3-quarter roadmap narrative and save to docs/roadmap/roadmap-[year].md:
1. Strategic theme per quarter (one evocative headline)
2. Why this sequence (dependencies, learning, risk)
3. The cumulative story: what is the product by end of Q3?
4. What we deliberately traded off and why

Write two versions:
A) Engineering team — technical context, dependencies explicit
B) Board/investors — strategic narrative, metrics focus

Both under 400 words. This file is the source of truth —
link to it from Linear, Notion, and stakeholder emails.</pre></div>
<div class="callout tip"><p>Treat your roadmap file like a living document. When priorities change, update it on a branch and open a PR — the diff shows stakeholders exactly what changed and why, without a single "what's changed since last week" meeting.</p></div>
<div class="callout exercise"><p>Score your current backlog using RICE, commit the results, and build the roadmap narrative. Open a PR titled "Roadmap: [year] — please review" and tag all relevant stakeholders. Let them comment on the file rather than sending separate emails.</p></div>
`},

{part:5,partTitle:"Strategy & Planning",partSub:"Set direction, prioritise ruthlessly, and plan for launch",
title:"Go-to-Market & Launch Planning",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P5</span> Strategy & Planning · Lesson 26</div>
  <div class="lesson-title">Go-to-Market & Launch Planning</div>
  <div class="lesson-intro">A great feature poorly launched is a missed opportunity. Claude builds launch checklists, writes comms, coordinates cross-functional GTM plans, and runs pre-launch risk reviews. Everything lives in your repo — one URL, all the context, every team aligned.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">Launch brief prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Write a launch brief for [feature].

Read the PRD at docs/prds/[feature]-prd.md for context.

Save to docs/launches/[feature]-launch-brief.md:

## The One-Liner (for all comms)
## Target Audience (primary + secondary)
## Key Messages (one per: users / sales / press)
## Launch Goals (metrics at 1 week / 1 month / 3 months)
## What We're NOT Saying (positioning guardrails)
## Risks (top 3 things that could go wrong)</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Launch checklist generator</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Read docs/launches/[feature]-launch-brief.md

Generate a cross-functional launch checklist and save to
docs/launches/[feature]-launch-checklist.md

Format as a GitHub-flavoured markdown checklist:
## Engineering
- [ ] Feature flagged and ready to enable
- [ ] Load tested for expected traffic

## Design
- [ ] All states signed off (empty, loading, error, success)

## Marketing
- [ ] In-app notification copy approved

## Sales
- [ ] Talking points distributed and rehearsed

## Customer Success
- [ ] FAQ doc ready and linked in help centre

## Legal
- [ ] Any new claims reviewed and approved

Flag dependencies between teams and add them as GitHub Issue links.</pre></div>
<h2>Launch Day as a GitHub Issue</h2>
<div class="code-block"><div class="code-header"><span class="code-label">Launch day issue template</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># Launch Day: [Feature Name] — [Date]

Checklist: [link to docs/launches/[feature]-launch-checklist.md]
Brief: [link to docs/launches/[feature]-launch-brief.md]

## Go / No-Go
- [ ] Engineering: ready to enable
- [ ] CS: support ready
- [ ] Marketing: comms scheduled

## Launch log (update in real time)
- [time]: Feature flag enabled for 10% of users
- [time]: First user feedback in #feedback Slack

## Rollback trigger
If [metric] drops >X% in the first 2 hours, roll back via [link to runbook]</pre></div>
<div class="callout tip"><p>The launch issue becomes your real-time log. Pin it in your Slack channel on launch day. Everyone — engineering, CS, sales — updates it as things happen. It's your single source of truth and post-launch retrospective in one.</p></div>
<div class="callout exercise"><p>For your next feature launch, create the full set of launch docs in <code>docs/launches/</code> and open a GitHub Issue for launch day. Link all the docs from the issue. Ask each team lead to confirm their section of the checklist by checking off items in the issue.</p></div>
`},

{part:6,partTitle:"Documents & Communication",partSub:"Build a document system that gets smarter every time",
title:"Build a PRD Skill That Learns Over Time",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P6</span> Documents & Communication · Lesson 27</div>
  <div class="lesson-title">Build a PRD Skill That Learns Over Time</div>
  <div class="lesson-intro">A PRD command that lives in your GitHub repo gets better with every feature you ship. Your team can suggest improvements via PRs, you can track the evolution of your template in git history, and every PRD is a single linked document — not an attachment in an email chain.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">.claude/commands/prd-full.md</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Read CLAUDE.md first. Feature to spec: $ARGUMENTS

PHASE 1 — Ask me these one at a time:
1. "Who's asking for this — users, sales, or internal?"
2. "JTBD: 'When I [situation], I want to [motivation] so I can [outcome]'"
3. "Success in numbers: metric + target"
4. "What's the minimum useful version?"
5. "What's explicitly out of scope?"

PHASE 2 — Write the PRD and save to docs/prds/[feature-name]-prd.md:
# [Feature] PRD | Author | Date | Draft

## Why This, Why Now
## Users & Jobs to Be Done
## Success Metrics (table)
## Solution Overview
## Detailed Requirements
## Out of Scope
## Open Questions (owner + deadline each)
## Dependencies
## Risks (table)

PHASE 3 — Self-review:
- Ambiguous or untestable requirements?
- Missing dependencies?
- Single biggest risk to shipping on time?

Remind me to:
git checkout -b prd/[feature-name]
git add docs/prds/
git commit -m "docs: add PRD for [feature]"
git push origin prd/[feature-name]
# Then open a PR and request review from engineering + design</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Post-ship learning → improve the command</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>We shipped [feature]. Read docs/prds/[feature]-prd.md

Retrospective:
1. Which requirements changed in development?
2. Were there dependencies we missed?
3. What did the PRD not capture that caused problems?

Suggest specific changes to .claude/commands/prd-full.md:
Format: "Add [X] to [section] because [reason from retro]"

Then: git checkout -b improve/prd-command
# Make the suggested changes to .claude/commands/prd-full.md
git commit -m "improve: update PRD command based on [feature] retro"
git push
# Open a PR so the whole team benefits from the improvement</pre></div>
<div class="callout tip"><p>Every time you improve your PRD command via a PR, your teammates automatically get the improved version when they pull. Your command library gets better as a team, not just individually.</p></div>
<div class="callout exercise"><p>Write a real PRD using the command. Open it as a PR on GitHub and request review from engineering and design. After the feature ships, run the retro prompt and open a PR to improve the command. Merge both. This is the full loop.</p></div>
`},

Rewrite the executive summary for:

Save as:

docs/briefs/[topic]-brief-eng.md
docs/briefs/[topic]-brief-board.md</pre></div>

content:`

<div class="code-block"><div class="code-header"><span class="code-label">.claude/commands/weekly-update.md</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
