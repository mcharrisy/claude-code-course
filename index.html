{part:7,partTitle:"The PM Operating System",partSub:"Compose everything into YOUR personal PM workspace",
title:"Design Your PM Workspace from Scratch",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P7</span> The PM Operating System · Lesson 31</div>
  <div class="lesson-title">Design Your PM Workspace from Scratch</div>
  <div class="lesson-intro">Your PM workspace is a GitHub repository. Everything you've built across this course — research, specs, analysis, roadmaps, decisions, prototypes — lives in one place, version-controlled, shareable, and searchable. This lesson sets it all up from scratch.</div>
</div>
<h2>Create Your PM Workspace Repo</h2>
<ol class="steps">
  <li>Go to <strong>github.com/new</strong> and create a repo: <code>pm-workspace</code> (or use your company org)</li>
  <li>Set visibility: <strong>Private</strong> (switch to Public if you want to share your command library openly)</li>
  <li>Initialise with a README</li>
  <li>Clone it locally and scaffold the structure</li>
  <li>Enable GitHub Pages for the <code>/prototypes</code> folder</li>
</ol>
<div class="code-block"><div class="code-header"><span class="code-label">Scaffold the workspace</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>git clone github.com/[you]/pm-workspace
cd pm-workspace

mkdir -p .claude/commands
mkdir -p docs/{prds,briefs,research/{raw,},analysis,competitive,feedback,voc/{weekly,monthly},roadmap,okrs,updates,specs,design,experiments,launches,engineering,presentations}
mkdir -p prototypes/reports prototypes/presentations
mkdir -p data/exports

touch CLAUDE.md
touch docs/decisions-log.md
touch docs/voc/themes.md

git add .
git commit -m "init: scaffold PM workspace"
git push</pre></div>
<h2>The Master CLAUDE.md</h2>
<div class="code-block"><div class="code-header"><span class="code-label">CLAUDE.md — committed to the repo root</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre># PM Workspace — [Your Name]
# Repo: github.com/[you]/pm-workspace
# GitHub Pages: https://[you].github.io/pm-workspace/

## My PM Philosophy
[2-3 sentences on how you approach product management]

## Current Focus
- Company: [Company]
- Primary product: [Product]
- Current quarter OKR: docs/okrs/[current-quarter].md
- My biggest challenge right now: [challenge]

## How to Work with Me
- Direct, structured outputs
- Options ranked by impact, with a recommendation
- When writing for stakeholders, match their vocabulary
- Flag assumptions explicitly
- Always save outputs to the correct docs/ folder and remind me to commit

## My Command Library (in .claude/commands/)
- /project:prd — Write a PRD → docs/prds/
- /project:brief — Write a one-pager → docs/briefs/
- /project:retro — Sprint retrospective
- /project:weekly-update — Friday status → docs/updates/
- /project:voc-weekly — VoC digest → docs/voc/weekly/
- /project:monday-kickoff — Weekly planning
- /project:log-decision — Update decisions-log.md

## Repo Structure
- Prototypes & reports: /prototypes/ (GitHub Pages)
- All PM docs: /docs/ (see subfolders)
- Raw data exports: /data/exports/
- Team commands: /.claude/commands/

## Recurring Rituals
- Monday: /monday-kickoff
- Friday: /weekly-update + /voc-weekly
- Monthly: /voc-weekly (full synthesis) + competitive refresh
- Quarterly: Update this CLAUDE.md + OKR PR</pre></div>
<div class="callout exercise"><p>Create your pm-workspace repo on GitHub today. Run the scaffold command. Write your CLAUDE.md. Enable GitHub Pages. Commit everything with the message "init: PM workspace ready." Share the GitHub URL with your team — this is now your PM home base.</p></div>
`},

{part:7,partTitle:"The PM Operating System",partSub:"Compose everything into YOUR personal PM workspace",
title:"Build Repeatable Workflows for Any PM Task",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P7</span> The PM Operating System · Lesson 32</div>
  <div class="lesson-title">Build Repeatable Workflows for Any PM Task</div>
  <div class="lesson-intro">Workflow scripts automate your most common PM jobs — consistent outputs, every time. Because they live in <code>.claude/commands/</code> in your GitHub repo, they improve with pull requests and propagate to your team instantly on <code>git pull</code>.</div>
</div>
<div class="code-block"><div class="code-header"><span class="code-label">.claude/commands/monday-kickoff.md</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Run my weekly kickoff.

Read:
- CLAUDE.md (current OKR and project context)
- docs/decisions-log.md (decisions from last week)
- Most recent file in docs/updates/ (last Friday's update)
- Most recent file in docs/voc/weekly/ (customer signal)

Step 1 — CONTEXT: Confirm current OKR and sprint goal.
Flag any decisions from last week that need follow-up.

Step 2 — PRIORITIES: Ask me:
"Top 3 priorities to make progress on this week?
The ONE thing that makes this week a success?"

Step 3 — SCHEDULE: Ask me to paste this week's calendar.
Identify: meetings that could be async, missing prep,
deep work blocks needed.

Step 4 — SAVE WEEKLY PLAN to docs/updates/week-[YYYY-WNN]-plan.md:
## Week of [date]
**The ONE thing:** | **Priorities:** | **Calendar prep:** | **Metrics to watch:**

Commit:
git add docs/updates/
git commit -m "planning: week [N] kickoff plan"
git push</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">.claude/commands/log-decision.md</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>Log a product decision: $ARGUMENTS

Read docs/decisions-log.md for context.

Append to docs/decisions-log.md:
---
## [Short title]
**Date:** | **Context:** | **Options:** | **Decision:** |
**Reasoning:** | **Who decided:** | **Revisit:**

Then commit:
git add docs/decisions-log.md
git commit -m "decision: [short title]"
git push

Then ask: "Who needs to be informed? Want me to draft a message?"</pre></div>
<div class="callout tip"><p>Decisions committed to GitHub are searchable forever. When someone asks "why did we build it that way?" — the answer is in <code>docs/decisions-log.md</code>, with a date, context, and reasoning. This is one of the highest-value habits in this entire course.</p></div>
<div class="callout exercise"><p>Set up the Monday kickoff command and run it today. Commit the plan. Then, the next time you make a product decision — any decision — run /log-decision and commit it. Do this for one month and your decisions-log will become one of the most valuable files in your repo.</p></div>
`},

{part:7,partTitle:"The PM Operating System",partSub:"Compose everything into YOUR personal PM workspace",
title:"Compose It All Into YOUR Operating System",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P7</span> The PM Operating System · Lesson 33</div>
  <div class="lesson-title">Compose It All Into YOUR Operating System</div>
  <div class="lesson-intro">Everything you've built is now ready to compose into a unified operating system. Your GitHub repo is the backbone — it holds your memory, your commands, your work, and your rituals. This lesson ties it all together.</div>
</div>
<h2>Your Five-Layer Stack</h2>
<ol>
  <li><strong>Memory Layer:</strong> CLAUDE.md files committed to GitHub — always in sync, always versioned</li>
  <li><strong>Command Layer:</strong> <code>.claude/commands/</code> in the repo — shareable via <code>git pull</code></li>
  <li><strong>Workflow Layer:</strong> Multi-step commands that read from and write to <code>docs/</code></li>
  <li><strong>Integration Layer:</strong> GitHub MCP reads your repo directly; other MCPs write back to it</li>
  <li><strong>Ritual Layer:</strong> A weekly schedule of commands that keep everything in sync</li>
</ol>
<div class="code-block"><div class="code-header"><span class="code-label">Weekly PM OS ritual schedule</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre>MONDAY (15 min)
  → /monday-kickoff
  → git commit "planning: week kickoff"

DAILY (as needed)
  → /prd | /brief | /log-decision
  → git commit after each output

FRIDAY (20 min)
  → /voc-weekly [paste feedback]
  → /weekly-update [paste raw inputs]
  → git commit "update: week [N] digest"
  → git push

MONTHLY (30 min)
  → /voc-weekly (full monthly synthesis)
  → Refresh docs/competitive/ for top 2 competitors
  → git commit "monthly: VoC + competitive refresh"

QUARTERLY (1 hour)
  → Update CLAUDE.md with new context
  → OKR PR: git checkout -b okrs/[quarter] → PR for team review
  → Roadmap PR: git checkout -b roadmap/[year] → PR for stakeholders
  → Run .claude/commands/ audit (see prompt below)</pre></div>
<div class="code-block"><div class="code-header"><span class="code-label">Quarterly OS audit prompt</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<pre">Read all files in this repo: CLAUDE.md, .claude/commands/,
docs/decisions-log.md, docs/updates/, docs/voc/

Tell me:
1. What context in CLAUDE.md is now outdated?
2. Which commands in .claude/commands/ haven't produced outputs
   in docs/ this quarter? (suggest archiving or updating them)
3. Patterns in decisions-log that suggest recurring problems
   we should solve systemically?
4. Tasks I do repeatedly that aren't yet automated as a command?
5. What should I add to CLAUDE.md based on this quarter's learnings?

Save the audit to docs/audits/os-audit-[date].md
Then: open a PR with all updates, title: "OS audit: [quarter] updates"</pre></div>
<div class="callout exercise"><p>Run the quarterly audit right now — even if it's not quarter end. Commit the audit file. Open a PR with all the CLAUDE.md and command updates it suggests. Merge it. Your operating system just got better.</p></div>
`},

{part:7,partTitle:"The PM Operating System",partSub:"Compose everything into YOUR personal PM workspace",
title:"Onboard Your Team and Become an AI Leader",
content:`
<div class="lesson-header">
  <div class="lesson-tag"><span class="part-badge">P7</span> The PM Operating System · Lesson 34</div>
  <div class="lesson-title">Onboard Your Team and Become an AI Leader</div>
  <div class="lesson-intro">The biggest leverage point isn't using these tools yourself — it's spreading them to your team. Because everything lives in GitHub, onboarding is as simple as sharing a repo link. This lesson covers how to make adoption actually stick.</div>
</div>
<h2>The GitHub Onboarding Flow</h2>
<p>The beauty of having your workspace in GitHub: there's no setup guide to write. The onboarding is just:</p>

const completed=new Set(JSON.parse(localStorage.getItem('ccpm_gh')||'[]').map(Number));
let current=parseInt(localStorage.getItem('ccpm_gh_cur')||'0');
function saveState(){localStorage.setItem('ccpm_gh',JSON.stringify([...completed]));localStorage.setItem('ccpm_gh_cur',String(current));}
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  let lastPart=-1,html='';
  LESSONS.forEach((l,i)=>{
    if(l.part!==lastPart){html+=`<div class="part-header"><span class="part-num">P${l.part}</span>${l.partTitle}</div><div class="part-subtitle">${l.partSub}</div>`;lastPart=l.part;}
    html+=`<button class="lesson-btn ${completed.has(i)?'done':''} ${i===current?'active':''}" onclick="navigate(${i})"><span class="lesson-num">${i+1}</span>${l.title}</button>`;
  });
  sb.innerHTML=html;
}
function renderLesson(idx){
  const l=LESSONS[idx],isDone=completed.has(idx),div=document.getElementById('lessonContent');
  div.innerHTML=l.content+`<div class="lesson-nav"><button class="nav-btn" onclick="navigate(${idx-1})" ${idx===0?'disabled':''}>← Previous</button><button class="complete-btn ${isDone?'done':''}" onclick="markDone(${idx})">${isDone?'✓ Completed':'Mark Complete →'}</button><button class="nav-btn" onclick="navigate(${idx+1})" ${idx===LESSONS.length-1?'disabled':''}>Next →</button></div>`;
  div.scrollTop=0;updateProgress();
}
function navigate(idx){if(idx<0||idx>=LESSONS.length)return;current=idx;saveState();buildSidebar();renderLesson(idx);}
function markDone(idx){if(completed.has(idx)){completed.delete(idx);}else{completed.add(idx);if(idx<LESSONS.length-1)setTimeout(()=>navigate(idx+1),300);}saveState();buildSidebar();renderLesson(idx);}
function updateProgress(){const pct=Math.round((completed.size/LESSONS.length)*100);document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressLabel').textContent=`${completed.size} / ${LESSONS.length} complete`;}
function copyCode(btn){const pre=btn.closest('.code-block').querySelector('pre');navigator.clipboard.writeText(pre.textContent).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);});}
buildSidebar();renderLesson(current);
</script>
